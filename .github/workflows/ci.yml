name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build and test (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: arm64
            runner: macos-26
          - architecture: x86_64
            runner: macos-26-intel
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build and test
        env:
          COPYLASSO_CI_ARCH: ${{ matrix.architecture }}
          COPYLASSO_CI_FAILURE_PROBE: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-failure-probe') }}
        run: ./scripts/ci.sh

      - name: Package maintained-runtime artifact
        if: matrix.architecture == 'arm64'
        run: |
          /usr/bin/tar -czf "$RUNNER_TEMP/copylasso-maintained-runtime.tar.gz" \
            -C "$GITHUB_WORKSPACE/.build/ci-arm64/Build/Products/Release" \
            CopyLasso.app

      - name: Upload maintained-runtime artifact
        if: matrix.architecture == 'arm64'
        uses: actions/upload-artifact@v7
        with:
          name: copylasso-maintained-runtime
          path: ${{ runner.temp }}/copylasso-maintained-runtime.tar.gz
          if-no-files-found: error
          retention-days: 1

  maintained-os-runtime:
    name: maintained OS runtime (macOS 15 arm64)
    needs: build-and-test
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download maintained-runtime artifact
        uses: actions/download-artifact@v7
        with:
          name: copylasso-maintained-runtime
          path: ${{ runner.temp }}

      - name: Run on the maintained hosted macOS
        env:
          COPYLASSO_MINIMUM_OS_MAJOR: "15"
        run: |
          /bin/mkdir -p "$RUNNER_TEMP/copylasso-maintained-runtime"
          /usr/bin/tar -xzf "$RUNNER_TEMP/copylasso-maintained-runtime.tar.gz" \
            -C "$RUNNER_TEMP/copylasso-maintained-runtime"
          ./scripts/test-minimum-macos.sh \
            "$RUNNER_TEMP/copylasso-maintained-runtime/CopyLasso.app"
